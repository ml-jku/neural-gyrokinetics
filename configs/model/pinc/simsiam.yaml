name: simsiam
model_type: simsiam
bundle_seq_length: 1
latent_dim: 1024
act_fn: GELU
decouple_mu: true
conditioning: ["itg", "dg", "s_hat", "q"]  # "timestep"
# conditioning: []  # for no conditioning
extra_zf_loss: false
init_weights: "kaiming_uniform"  # "xavier_uniform", "truncnormal", "kaiming_uniform"
patching_init_weights: "kaiming_uniform"
cond_init_weights: "kaiming_uniform"  # "kaiming_uniform", "normal_smallvar", "xavier_uniform"

loss_scheduler:
  df: null
    # type: "linear"
    # start: 1.0
    # end: 0.3
    # start_fraction: 0.6
    # end_fraction: 1.0
  simsiam: null
    # type: "linear"
    # start: 0.0
    # end: 1.0
    # start_fraction: 0.2
    # end_fraction: 0.7
loss_weights:
  df: 1.0
  simsiam: 1.0

extra_loss_weights:

patch:
  patch_size: [ 4, 0, 2, 5, 4 ]
  window_size: [ 4, 0, 4, 9, 4 ]
  merging_depth: 1
  unmerging_depth: 1
  merging_hidden_ratio: 1.0
  unmerging_hidden_ratio: 1.0
  c_multiplier: 1.0

vit:
  num_heads: [8, 16]
  depth: [4, 4]
  gradient_checkpoint: false
  use_abs_pe: false
  use_rpb: true
  use_rope: false
  gated_attention: true
  modulation: dit # "dit", "film"
  drop_path: 0.1

bottleneck:
  dim: 256
  norm_learnable: false
  num_heads: 4
  depth: 2
  use_simae_decoder: true
  vit_predictor: true
