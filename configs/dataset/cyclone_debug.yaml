name: cyclone
path: /local00/bioinf/galletti/preprocessed_kvikio
backend: gds  # gds, h5
normalization: 
  df: 
    type: zscore
    agg_axes: [1, 3, 4, 5]
  flux: 
    type: zscore
    agg_axes: null
  phi: 
    type: zscore
    agg_axes: [0, 1, 2]
normalization_scope: dataset
minmax_beta1: 8
minmax_beta2: 4
offset: 80
subsample: 1
val_subsample: 10
spatial_ifft: true
separate_zf: true
norm_decouple_mu: true
real_potens: true
split_into_bands: null
log_transform: false
num_workers: 10
active_keys: ["re", "im"]
input_fields: ["df"]
training_trajectories: ["iteration_13"]
validation_trajectories: ["iteration_13"]
partial_holdouts:
training_cond_filters:
  last_fluxes: [1., .inf]
  first_fluxes: [1., .inf]
eval_cond_filters:
  last_fluxes: [1., .inf]
  first_fluxes: [1., .inf]


augment:
  noise: 
    active: false
    noise_std: 1e-4
  mask_modes:
    active: false
    mask_ratio: 0.1
    is_fourier: false
    weights: null
    rescale: false
    mask_zero_mode: true
    df_delta_weight: 1.0

timestep_std_filter: null  # std-based timestep filtering threshold (null to disable)
timestep_std_offset: 80