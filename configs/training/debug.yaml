batch_size: 1
n_epochs: 5
num_workers: 4
pin_memory: true
learning_rate: 3e-4
final_learning_rate: 1e-6
weight_decay: 1e-5
exclude_from_wd: []
predict_delta: false
scheduler: "cosine"
clip_grad: true
clip_to: 1.0
gradnorm_balancer: "none"
pushforward:
  epochs: [-1]
  unrolls: [0]
  probs: [1]

pretraining: false
pretraining_kwargs:
  freeze_after: false
  clip_grad: false
  scheduler: null
  weight_decay: 1e-5
  lr: 1e-3
  n_epochs: 35
  target_modules: [patch_embed, unpatch]
  add_noise: false

