batch_size: 8
n_epochs: 100
num_workers: 4
pin_memory: true
learning_rate: 1e-3
final_learning_rate: 1e-6
weight_decay: 1e-5
predict_delta: false
pretraining: true
scheduler: "cosine"
clip_grad: true
pushforward:
  epochs: [-1, -1]
  unrolls: [1, 2]
  probs: [10, 10]
pretraining_kwargs:
  freeze_after: false
  clip_grad: false
  scheduler: null
  weight_decay: 1e-5
  lr: 1e-3
  n_epochs: 35
  target_modules: [patch_embed, unpatch]
  add_noise: false

