batch_size: 2
n_epochs: 500
num_workers: 4
pin_memory: true
learning_rate: 1e-3
final_learning_rate: 1e-6
weight_decay: 1e-5
predict_delta: false
scheduler: "cosine"
clip_grad: true
pushforward:
  epochs: [-1, 200, 350]
  unrolls: [1, 2, 4]
  probs: [16, 4, 3]
pretraining: false
pretraining_kwargs:
  freeze_after: false
  clip_grad: false
  scheduler: null
  weight_decay: 1e-5
  lr: 5e-4
  n_epochs: 20
  target_modules: [patch_embed, unpatch]
  add_noise: false

