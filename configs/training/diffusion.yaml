batch_size: 512
n_epochs: 200
num_workers: 4
pin_memory: true
learning_rate: 1e-3
use_latest_checkpoint: True
final_learning_rate: 1e-6
weight_decay: 1e-6
exclude_from_wd: ["cond"]
predict_delta: false
scheduler: "cosine"
clip_grad: true
clip_to: 1.0
gradnorm_balancer: "none"  # "none", "full", "pseudo"
