defaults:
  - _self_
  - dataset: cyclone
  - model: multi
  - logging: no_logging
  - training: default
  - validation: default
  - optional experiment: null

experiment_id: test
seed: 0
output_path: null
ddp:
  enable: false
  n_nodes: 1
amp: 
  enable: true  # set to false when using rope or integrals in training (complex / fft)
