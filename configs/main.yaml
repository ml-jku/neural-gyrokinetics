load_ckpt: false
workflow: "gyroswin" # "gyroswin", "pinc", "diffusion"
stage: null  # training style, eg. "autoencoder", "peft"
ae_checkpoint: "/system/user/publicwork/galletti/huggingface/autoencoders/ae/best.pth"